id = "06-approve-label-mismatch"
title = "Approve label does not match the dangerous tool's PascalCase identifier"
bug_class = "approval-label-mismatch"
description = """
The user wrote an approval for a label that does not correspond to any
dangerous tool. Convention-only stacks pass through; Corvid rejects.
"""

[expected]
corvid = "rejected"
python = "accepted"
typescript = "accepted"

corvid_guarantee_id = "approval.dangerous_call_requires_token"
python_baseline = "mypy --strict + pydantic"
typescript_baseline = "tsc --strict + zod"
