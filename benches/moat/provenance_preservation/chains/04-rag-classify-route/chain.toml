id = "04-rag-classify-route"
title = "Retrieve doc → classify topic → route to specialist agent"
hops = 4
description = """
A retrieved document is classified into one of N topic buckets, and
the answer is generated by the specialist agent for that bucket.
Classification is the provenance-shedding step in convention-only
stacks: a topic label is just a string, with no link back to the
document it was inferred from.
"""

[expected]
corvid = "preserved"
python = "lost"
typescript = "lost"

corvid_provenance_type = "Grounded<String>"
python_baseline = "LangChain RouterChain + LLMChain"
typescript_baseline = "Vercel AI SDK generateObject (router) + zod"
