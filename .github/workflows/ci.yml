name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  workspace-tests:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check --workspace
        run: cargo check --workspace --all-targets

      - name: cargo test --workspace
        run: cargo test --workspace --lib --tests

      # Routing/report slices extend the shared trace schema. Keep a
      # narrow replay test in CI so new metadata-only events stay
      # replay-loadable without relying on broader workspace coverage.
      - name: trace replay compatibility (EnsembleVote + adversarial pipeline events)
        run: cargo test -p corvid-repl replay_accepts_routing_trace_events --test replay

  windows-runtime-record:
    name: Windows runtime record/replay guard
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Keep a focused Windows gate on the shared cdylib runtime
      # path that records and replays traces through `corvid_call_agent`.
      # This is the regression guard for 22-H-windows-record.
      - name: cargo test -p corvid-runtime --test trace_record
        run: cargo test -p corvid-runtime --test trace_record

  phase35-launch-gates:
    # Phase 35 is the launch-claim gate. These checks are named
    # explicitly so a green workflow proves the signed cdylib claim
    # surface, not only generic workspace health.
    name: 35 signed-artifact launch gates
    runs-on: ubuntu-latest
    needs: workspace-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: ABI descriptor + attestation byte fuzz corpus
        run: cargo test -p corvid-abi --test byte_fuzz_corpus -- --nocapture

      - name: Source-level bypass corpus
        run: cargo test -p corvid-types --test source_bypass_corpus -- --nocapture

      - name: Source-level adversarial guarantee tags
        run: cargo test -p corvid-types adversarial_source_mutator -- --nocapture

      - name: Independent ABI verifier
        run: cargo test -p corvid-abi-verify -- --nocapture

      - name: Signed cdylib attestation verification
        run: cargo test -p corvid-cli --test abi_attestation -- --nocapture

      - name: Claim explanation command
        run: cargo test -p corvid-cli --test claim_cmd -- --nocapture

      - name: Signed build claim-coverage refusal
        run: cargo test -p corvid-driver signed_claim_coverage -- --nocapture

      - name: Core semantics registry + doc drift gate
        run: |
          cargo test -p corvid-guarantees
          cargo run -q -p corvid-cli -- contract regen-doc /tmp/corvid-core-semantics.md
          diff -u docs/core-semantics.md /tmp/corvid-core-semantics.md

  effect-system-gates:
    # Every one of these gates enforces a Phase 20g invention. If
    # any of them fails, the effect system has silently regressed.
    name: 20g effect-system gates
    runs-on: ubuntu-latest
    needs: workspace-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build CLI
        run: cargo build -p corvid-cli --release

      # Invention #6 + #7: every built-in dimension and every custom
      # dimension declared in the project's corvid.toml must satisfy
      # its archetype's algebraic laws.
      - name: corvid test dimensions
        run: ./target/release/corvid test dimensions

      # Invention #8: every ```corvid example in the spec must match
      # its declared `# expect:` outcome against the current compiler.
      - name: corvid test spec
        run: ./target/release/corvid test spec

      # Invention #10: every historical counter-example under
      # docs/effects-spec/counterexamples/composition/ must still
      # distinguish its correct composition rule from the attacker's.
      - name: corvid test spec --meta
        run: ./target/release/corvid test spec --meta

      # Invention #4: semantic-preserving rewrites must not drift
      # composed effect profiles. Failures name the rewrite rule,
      # semantic law, first changed line, and shrunk reproducer.
      - name: corvid test rewrites
        run: ./target/release/corvid test rewrites

      # Invention #1 + #4: cross-tier differential verification over
      # the full corpus. `tests/corpus/should_fail/*` is expected to
      # exit 1 — that's the fail-safe that proves the harness catches
      # divergences. A `0` exit code here would mean the harness
      # stopped catching the known-bad cases.
      - name: corvid verify --corpus tests/corpus (must report divergences)
        run: |
          set +e
          ./target/release/corvid verify --corpus tests/corpus
          code=$?
          if [ $code -eq 0 ]; then
            echo "::error::corvid verify exited 0 but the corpus contains deliberate-fail fixtures that should diverge"
            exit 1
          fi
          if [ $code -ne 1 ]; then
            echo "::error::corvid verify exited $code; expected 1 (divergences detected)"
            exit $code
          fi
          echo "ok: corvid verify exited 1 as expected"

  phase23-browser-ci:
    # Phase 23-F: headless-Chromium end-to-end test of the
    # examples/wasm_browser_demo. Wasmtime parity proves WASM-as-a-
    # runtime works; this job proves the generated ES loader, the
    # typed host capabilities, the approve/deny path, and the
    # schema-v2 trace events all still agree after any change to
    # either side.
    name: 23 wasm browser demo (headless Chromium)
    runs-on: ubuntu-latest
    needs: workspace-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build wasm artifacts
        run: |
          cargo run -q -p corvid-cli -- build \
            examples/wasm_browser_demo/src/refund_gate.cor \
            --target=wasm

      - name: Verify wasm artifact shape
        run: bash examples/wasm_browser_demo/verify.sh

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + browsers
        working-directory: examples/wasm_browser_demo/test
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Run browser smoke test
        working-directory: examples/wasm_browser_demo/test
        run: npx playwright test

  python-features:
    # Phase 30-J: Python FFI integration tests must run on every push.
    # The default workspace test run does NOT enable the `python`
    # feature flag, so a regression in the pyo3 call bridge, GIL
    # handling, type marshaling, or trace event emission would not be
    # caught without this matrix entry.
    name: python-features
    runs-on: ubuntu-latest
    needs: workspace-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install pinned CPython
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-py-

      # Phase 30-J slice gate: feature-gated Python integration tests
      # exercise scalar/list/dict round-trip, exception marshaling
      # with traceback preservation, python.call/result/error events,
      # and sandbox-profile-denied imports.
      - name: cargo test -p corvid-runtime --features python
        run: cargo test -p corvid-runtime --features python --tests -- --nocapture

  phase33-moat-provenance-preservation:
    # Phase 33-N (provenance preservation rate benchmark). Static
    # type-level analysis over multi-hop AI workflows; the drift
    # gate compares the runner's regenerated RESULTS.md byte-for-byte
    # against the committed file. A divergence means either the
    # chains changed and the maintainer forgot to re-run, or the
    # runner's classification heuristics changed and the committed
    # RESULTS.md is stale.
    name: 33 moat provenance preservation rate
    runs-on: ubuntu-latest
    needs: workspace-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run provenance preservation runner
        run: |
          python benches/moat/provenance_preservation/runner/run.py \
            --chains-dir benches/moat/provenance_preservation/chains \
            --out      /tmp/provenance_preservation_RESULTS.md

      - name: Drift gate vs committed RESULTS.md
        run: diff -u benches/moat/provenance_preservation/RESULTS.md /tmp/provenance_preservation_RESULTS.md

  phase33-moat-governance-lines:
    # Phase 33-N (governance line-count benchmark). Pure-Python counter
    # over the apps under benches/moat/governance_lines/apps. The drift
    # gate compares the runner's regenerated RESULTS.md byte-for-byte
    # against the committed file; a divergence means either the apps
    # changed and the maintainer forgot to re-run the counter, or the
    # counter changed and the committed RESULTS.md is stale. Either way
    # CI fails the build.
    name: 33 moat governance line-count
    runs-on: ubuntu-latest
    needs: workspace-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run governance line-count counter
        run: |
          python benches/moat/governance_lines/runner/count.py \
            --apps-dir benches/moat/governance_lines/apps \
            --out      /tmp/governance_lines_RESULTS.md

      - name: Drift gate vs committed RESULTS.md
        run: diff -u benches/moat/governance_lines/RESULTS.md /tmp/governance_lines_RESULTS.md

  phase33-moat-compile-time-rejection:
    # Phase 33-N (compile-time rejection rate benchmark). Runs
    # `cargo run -p corvid-cli -- check`, `mypy --strict`, and
    # `tsc --strict --noEmit` over every case in
    # benches/moat/compile_time_rejection/cases/, then drift-gates
    # the regenerated RESULTS.md against the committed file. A
    # mismatch means either a stack's static checker behavior
    # changed (real signal — investigate) or the committed
    # RESULTS.md is stale (re-run the runner locally before merging).
    name: 33 moat compile-time rejection rate
    runs-on: ubuntu-latest
    needs: workspace-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-moat-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-moat-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps (pydantic + mypy)
        working-directory: benches/moat/compile_time_rejection
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install local Node deps (typescript + zod)
        working-directory: benches/moat/compile_time_rejection
        run: npm install --no-audit --no-fund

      - name: Build corvid CLI (release)
        run: cargo build -q -p corvid-cli --release

      - name: Run compile-time rejection runner
        env:
          # Use the release binary directly so the runner does not
          # re-invoke `cargo run` per case.
          CARGO_TERM_COLOR: always
        run: |
          python benches/moat/compile_time_rejection/runner/run.py \
            --cases-dir benches/moat/compile_time_rejection/cases \
            --out      /tmp/compile_time_rejection_RESULTS.md

      - name: Drift gate vs committed RESULTS.md
        run: diff -u benches/moat/compile_time_rejection/RESULTS.md /tmp/compile_time_rejection_RESULTS.md

  phase33-moat-replay-determinism:
    # Phase 33-N (replay determinism rate benchmark). Re-executes
    # examples/refund_bot_demo N times against mocked tools + mocked
    # LLM, normalizes ts_ms / run_id / rollout_default_seed value,
    # and pairwise byte-compares. Corvid is expected to score
    # determinism_rate == 1.0; the Python / TypeScript columns are
    # bounty-open and the orchestrator reports partial coverage
    # explicitly. The drift gate diffs the regenerated RESULTS.md
    # byte-for-byte against the committed file.
    name: 33 moat replay determinism rate
    runs-on: ubuntu-latest
    needs: workspace-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-replay-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-replay-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Corvid replay-determinism harness (N=20)
        run: |
          python benches/moat/replay_determinism/runs/corvid/run_corvid.py \
            --n 20 \
            --out benches/moat/replay_determinism/runs/corvid/_summary.json

      - name: Compose RESULTS.md from each stack's _summary.json
        run: |
          python benches/moat/replay_determinism/runner/run.py \
            --runs-dir benches/moat/replay_determinism/runs \
            --out      /tmp/replay_determinism_RESULTS.md

      - name: Drift gate vs committed RESULTS.md
        run: diff -u benches/moat/replay_determinism/RESULTS.md /tmp/replay_determinism_RESULTS.md

  phase33-moat-time-to-audit:
    # Phase 33-N (time-to-audit benchmark). For each stack with an
    # implementation under runs/<stack>/queries/, runs every
    # audit-question query, validates the answer byte-for-byte
    # against the question's expected_answer.json, and counts
    # audit-logic LOC. The drift gate diffs the regenerated
    # RESULTS.md byte-for-byte against the committed file. The
    # corpus_gen binary is part of the workspace; CI does not
    # regenerate the corpus (it would require a full cargo build
    # and produces traces with normalized fields that match
    # byte-for-byte against the committed corpus, but that's not
    # the property under test here — the audit-LOC count is).
    name: 33 moat time-to-audit
    runs-on: ubuntu-latest
    needs: workspace-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run time-to-audit runner
        run: |
          python benches/moat/time_to_audit/runner/run.py \
            --root benches/moat/time_to_audit \
            --out  /tmp/time_to_audit_RESULTS.md

      - name: Drift gate vs committed RESULTS.md
        run: diff -u benches/moat/time_to_audit/RESULTS.md /tmp/time_to_audit_RESULTS.md
